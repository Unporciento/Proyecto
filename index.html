<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Biomas — Maqueta 3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    /* ------ Paleta base (contenida, sin saturar) ------ */
    --glass-bg: rgba(20, 26, 24, 0.42);
    --glass-bg-soft: rgba(20, 26, 24, 0.30);
    --glass-border: rgba(255, 255, 255, 0.14);
    --glass-rim: rgba(255, 255, 255, 0.55);
    --glass-shadow: rgba(0, 0, 0, 0.40);
    --cream: #f4f1ea;
    --muted: rgba(244, 241, 234, 0.62);
    --muted-2: rgba(244, 241, 234, 0.4);
    --accent: #e8a33d;
    --accent-soft: rgba(232, 163, 61, 0.16);
    --moon: #a9c3e8;
    --radius-lg: 20px;
    --radius-md: 14px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #060a09;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
  }
  #canvas-container {
    position: fixed; inset: 0; width: 100%; height: 100%;
    cursor: grab;
  }
  #canvas-container:active { cursor: grabbing; }

  /* =========================================================================
     LIQUID GLASS — mixin visual compartido por todos los paneles flotantes.
     Idea: un vidrio esmerilado oscuro con un "rim light" sutil arriba (como
     si una luz cenital rozara el borde superior del panel) y una sombra
     difusa debajo para que flote sobre la escena 3D sin fundirse con ella.
     Todo a baja saturación para no competir con los colores del bioma.
  ========================================================================= */
  .glass {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-lg);
    backdrop-filter: blur(22px) saturate(140%);
    -webkit-backdrop-filter: blur(22px) saturate(140%);
    box-shadow:
      0 18px 46px var(--glass-shadow),
      inset 0 1px 0 var(--glass-rim),
      inset 0 0 0 1px rgba(255,255,255,0.03);
    position: relative;
  }
  /* leve degradado interno de arriba hacia abajo, como luz reflejándose en
     la superficie curva del "cristal" */
  .glass::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    pointer-events: none;
    background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0) 30%);
  }

  /* ---------------------------- Panel principal --------------------------- */
  #panel {
    position: fixed;
    left: 20px;
    bottom: 20px;
    width: 306px;
    padding: 20px 20px 18px;
    color: var(--cream);
  }
  #panel .eyebrow {
    font-size: 10.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted-2);
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #panel .eyebrow::before {
    content: "";
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px 1px var(--accent);
    flex-shrink: 0;
  }
  #panel h1 {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 22px;
    margin: 0 0 6px;
    line-height: 1.15;
  }
  #panel p {
    font-size: 12.5px;
    color: var(--muted);
    margin: 0 0 16px;
    line-height: 1.5;
  }

  #biome-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .biome-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 10px;
    border-radius: var(--radius-sm);
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.035);
    color: var(--cream);
    font-family: 'Poppins', sans-serif;
    font-size: 11.5px;
    font-weight: 500;
    text-align: left;
    cursor: pointer;
    transition: border-color 0.2s ease, background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
  }
  .biome-btn:hover {
    border-color: rgba(255,255,255,0.24);
    background: rgba(255,255,255,0.06);
    transform: translateY(-1px);
  }
  .biome-btn.active {
    border-color: rgba(232, 163, 61, 0.55);
    background: var(--accent-soft);
    box-shadow: 0 0 0 1px rgba(232,163,61,0.18), 0 6px 18px rgba(232,163,61,0.10);
  }
  .swatch {
    width: 16px; height: 16px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow:
      inset 0 0 0 1px rgba(0,0,0,0.3),
      inset 0 1px 1px rgba(255,255,255,0.5);
  }

  .panel-divider {
    height: 1px;
    margin: 16px 0 14px;
    background: linear-gradient(90deg, rgba(255,255,255,0.14), rgba(255,255,255,0));
  }

  #regrow-btn {
    width: 100%;
    padding: 9px;
    border-radius: var(--radius-sm);
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.04);
    color: var(--cream);
    font-family: 'Poppins', sans-serif;
    font-size: 11.5px;
    font-weight: 500;
    cursor: pointer;
    transition: border-color 0.2s ease, background 0.2s ease, transform 0.15s ease;
  }
  #regrow-btn:hover {
    border-color: rgba(255,255,255,0.26);
    background: rgba(255,255,255,0.07);
    transform: translateY(-1px);
  }

  /* ---------------------------- Hint superior ------------------------------ */
  #hint {
    position: fixed;
    top: 18px;
    left: 20px;
    padding: 9px 14px;
    color: var(--muted);
    font-size: 10.5px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-family: 'Poppins', sans-serif;
    border-radius: 999px;
  }

  /* --------------------- Panel de hora del día (arriba der.) --------------- */
  #daytime-panel {
    position: fixed;
    top: 18px;
    right: 20px;
    width: 224px;
    padding: 12px 14px 13px;
    color: var(--cream);
  }
  #daytime-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  #daytime-label {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--muted);
  }
  #daytime-icon {
    width: 14px; height: 14px;
    flex-shrink: 0;
    transition: transform 0.4s ease;
  }
  #daytime-text { color: var(--cream); font-weight: 500; }

  /* Segmented control Auto/Manual — dos pastillas dentro de un riel de vidrio */
  #mode-toggle {
    display: flex;
    background: rgba(0,0,0,0.22);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 999px;
    padding: 2px;
    gap: 2px;
  }
  .mode-btn {
    border: none;
    background: transparent;
    color: var(--muted-2);
    font-family: 'Poppins', sans-serif;
    font-size: 9.5px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 5px 10px;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.2s ease, color 0.2s ease;
  }
  .mode-btn.active {
    background: rgba(244,241,234,0.14);
    color: var(--cream);
  }

  /* Slider manual — riel con degradado noche→día→noche, y "sol/luna" como thumb */
  #manual-row {
    margin-top: 12px;
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    transition: max-height 0.3s ease, opacity 0.25s ease, margin-top 0.3s ease;
  }
  #manual-row.open {
    max-height: 40px;
    opacity: 1;
  }
  #phase-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 999px;
    background: linear-gradient(90deg,
      #0a1424 0%, #16233b 16%,
      #7fa8c9 32%, #ffd9a0 48%,
      #ffe6b8 58%, #ffd9a0 68%,
      #16233b 84%, #0a1424 100%);
    outline: none;
    cursor: pointer;
  }
  #phase-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 15px; height: 15px;
    border-radius: 50%;
    background: var(--cream);
    box-shadow: 0 0 0 3px rgba(244,241,234,0.18), 0 2px 6px rgba(0,0,0,0.4);
    cursor: pointer;
    margin-top: -0.5px;
  }
  #phase-slider::-moz-range-thumb {
    width: 15px; height: 15px;
    border: none;
    border-radius: 50%;
    background: var(--cream);
    box-shadow: 0 0 0 3px rgba(244,241,234,0.18), 0 2px 6px rgba(0,0,0,0.4);
    cursor: pointer;
  }
</style>
</head>
<body>

  <div id="canvas-container"></div>

  <div id="hint" class="glass">Arrastra para orbitar · Rueda para zoom · Mueve el mouse sobre el pasto</div>

  <div id="daytime-panel" class="glass">
    <div id="daytime-row">
      <div id="daytime-label">
        <svg id="daytime-icon" viewBox="0 0 24 24" fill="none">
          <circle id="daytime-icon-shape" cx="12" cy="12" r="5.2" fill="#ffd9a0"/>
          <g id="daytime-icon-rays" stroke="#ffd9a0" stroke-width="1.6" stroke-linecap="round">
            <line x1="12" y1="1.5" x2="12" y2="4"/>
            <line x1="12" y1="20" x2="12" y2="22.5"/>
            <line x1="1.5" y1="12" x2="4" y2="12"/>
            <line x1="20" y1="12" x2="22.5" y2="12"/>
            <line x1="4.4" y1="4.4" x2="6.1" y2="6.1"/>
            <line x1="17.9" y1="17.9" x2="19.6" y2="19.6"/>
            <line x1="4.4" y1="19.6" x2="6.1" y2="17.9"/>
            <line x1="17.9" y1="6.1" x2="19.6" y2="4.4"/>
          </g>
        </svg>
        <span id="daytime-text">Día</span>
      </div>
      <div id="mode-toggle">
        <button class="mode-btn active" data-mode="auto" type="button">Auto</button>
        <button class="mode-btn" data-mode="manual" type="button">Manual</button>
      </div>
    </div>
    <div id="manual-row">
      <input id="phase-slider" type="range" min="0" max="1000" value="500" />
    </div>
  </div>

  <div id="panel" class="glass">
    <div class="eyebrow">Entorno / Biomas</div>
    <h1 id="biome-title">Pradera de verano</h1>
    <p id="biome-desc">Pasto verde bajo un sol brillante de verano.</p>
    <div id="biome-grid"></div>
    <div class="panel-divider"></div>
    <button id="regrow-btn" type="button">🌱 Hacer brotar el pasto</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="./scene.js"></script>
  <script>
    const container = document.getElementById('canvas-container');
    BiomeScene.init(container);

    const grid = document.getElementById('biome-grid');
    const titleEl = document.getElementById('biome-title');
    const descEl = document.getElementById('biome-desc');

    let activeKey = 'verano';

    function swatchColor(hex) {
      return '#' + hex.toString(16).padStart(6, '0');
    }

    Object.entries(BiomeScene.BIOMES).forEach(([key, biome]) => {
      const btn = document.createElement('button');
      btn.className = 'biome-btn' + (key === activeKey ? ' active' : '');
      btn.dataset.key = key;
      btn.type = 'button';
      btn.innerHTML = `<span class="swatch" style="background: linear-gradient(135deg, ${swatchColor(biome.sky.bottom)}, ${swatchColor(biome.ground.high)})"></span>${biome.label}`;
      btn.addEventListener('click', () => {
        BiomeScene.setBiome(key);
      });
      grid.appendChild(btn);
    });

    document.getElementById('regrow-btn').addEventListener('click', () => {
      BiomeScene.regrow();
    });

    document.addEventListener('biomechange', (e) => {
      activeKey = e.detail.key;
      titleEl.textContent = e.detail.biome.label;
      descEl.textContent = e.detail.biome.desc;
      document.querySelectorAll('.biome-btn').forEach((b) => {
        b.classList.toggle('active', b.dataset.key === activeKey);
      });
    });

    // ------------------------------------------------------------------
    // Control de día / noche: segmented toggle Auto/Manual + slider.
    // En "auto" el ciclo corre solo (lento); en "manual" el slider manda
    // y BiomeScene congela el ciclo automático en esa fase exacta.
    // ------------------------------------------------------------------
    const modeButtons = document.querySelectorAll('.mode-btn');
    const manualRow = document.getElementById('manual-row');
    const phaseSlider = document.getElementById('phase-slider');
    const daytimeText = document.getElementById('daytime-text');
    const daytimeIcon = document.getElementById('daytime-icon');
    const iconShape = document.getElementById('daytime-icon-shape');
    const iconRays = document.getElementById('daytime-icon-rays');

    let currentMode = 'auto';

    modeButtons.forEach((btn) => {
      btn.addEventListener('click', () => {
        currentMode = btn.dataset.mode;
        modeButtons.forEach((b) => b.classList.toggle('active', b === btn));
        manualRow.classList.toggle('open', currentMode === 'manual');
        BiomeScene.setDayMode(currentMode);
        if (currentMode === 'manual') {
          BiomeScene.setManualPhase(Number(phaseSlider.value) / 1000);
        }
      });
    });

    phaseSlider.addEventListener('input', () => {
      BiomeScene.setManualPhase(Number(phaseSlider.value) / 1000);
    });

    // Refleja la hora del día en el texto + ícono (sol de día, luna de noche),
    // leyendo el factor real que calcula scene.js cada frame.
    function refreshDaytimeIndicator() {
      const dayFactor = BiomeScene.getDayFactor();
      let label, isNight;
      if (dayFactor > 0.55) { label = 'Día'; isNight = false; }
      else if (dayFactor > 0.12) { label = 'Amanecer / atardecer'; isNight = false; }
      else { label = 'Noche'; isNight = true; }

      daytimeText.textContent = label;
      iconShape.setAttribute('fill', isNight ? '#a9c3e8' : '#ffd9a0');
      iconRays.style.opacity = isNight ? 0.15 : 1;
      daytimeIcon.style.transform = isNight ? 'rotate(-14deg)' : 'rotate(0deg)';

      requestAnimationFrame(refreshDaytimeIndicator);
    }
    refreshDaytimeIndicator();
  </script>
</body>
</html>
